workload:
  # -- Enable the workload subchart.
  enabled: true
  controllerManager:
    image:
      # -- Image repository for the Controller Manager.
      repository: ghcr.io/volcano-sh/kthena-controller-manager
      # -- Image tag for the Controller Manager.
      tag: latest
      # -- Image pull policy for the Controller Manager.
      pullPolicy: IfNotPresent
    # -- Debug server port for Controller Manager (set 0 to disable).
    debugPort: 0
    downloaderImage:
      # -- Image repository for the Downloader.
      repository: ghcr.io/volcano-sh/downloader
      # -- Image tag for the Downloader.
      tag: latest
    runtimeImage:
      # -- Image repository for the Runtime.
      repository: ghcr.io/volcano-sh/runtime
      # -- Image tag for the Runtime.
      tag: latest
    webhook:
      # -- Enable webhook for the Controller Manager.
      enabled: true
      tls:
        # -- Secret name for storing webhook certificates.
        certSecretName: kthena-controller-manager-webhook-certs
        # -- Service name for the webhook.
        serviceName: kthena-controller-manager-webhook

networking:
  # -- Enable the networking subchart.
  enabled: true
  kthenaRouter:
    # -- Enable Kthena Router.
    enabled: true
    # -- Container port for Kthena Router.
    port: 8080
    # -- Debug server port for Kthena Router (localhost only).
    debugPort: 15000
    image:
      # -- Image repository for Kthena Router.
      repository: ghcr.io/volcano-sh/kthena-router
      # -- Image tag for Kthena Router.
      tag: latest
      # -- Image pull policy for Kthena Router.
      pullPolicy: IfNotPresent
    tls:
      # -- Enable TLS for Kthena Router server.
      enabled: false
      # -- DNS name to use for the certificate.
      dnsName: "your-domain.com"
      # -- Secret name to store the certificate and key.
      secretName: "kthena-router-tls"
    webhook:
      # -- Enable webhook for Kthena Router.
      enabled: true
      # -- Container port for Kthena Router webhook.
      port: 8443
      # -- Service port for Kthena Router webhook.
      servicePort: 443
      tls:
        # -- Certificate file path for the webhook.
        certFile: /etc/tls/tls.crt
        # -- Key file path for the webhook.
        keyFile: /etc/tls/tls.key
        # -- Secret name for storing webhook certificates.
        secretName: kthena-router-webhook-certs
    # priorityQueue configures the per-model request priority queue. User fairness
    # is the default priority strategy; session boost is an alternative strategy.
    priorityQueue:
      # -- Enable the request priority queue (default strategy: user fairness).
      enabled: false
      # -- Queue-level global total inflight request limit admitted to backends.<br/>
      # Shared by all strategies; size it as estimated per-pod concurrency x pod count.<br/>
      # `0` or unset uses the router default (16).
      maxConcurrent: 0
      # fairness holds settings for the default user-fairness priority strategy.
      fairness:
        # -- User-fairness strategy: sliding window duration for token usage tracking.
        windowSize: "1h"
        # -- User-fairness strategy: weight multiplier for input tokens.
        inputTokenWeight: 1.0
        # -- User-fairness strategy: weight multiplier for output tokens.
        outputTokenWeight: 2.0
      # sessionBoost selects the session-boost strategy (requires `priorityQueue.enabled=true`).
      sessionBoost:
        # -- Switch the priority queue to the session-boost strategy.<br/>
        # Replaces the default per-user fairness strategy with session-aware boosting
        # (the two strategies are mutually exclusive).
        enabled: false
        # -- HTTP header used to identify conversation sessions.
        header: "X-Session-ID"
        # -- Maximum number of recently-completed sessions kept warm for boosting.<br/>
        # Bounds an LRU cache; the least-recently-used session is evicted automatically.<br/>
        # Size it by the number of concurrent conversations to keep boosted.
        maxSessions: 4096
        # -- Wait time after a request completes for a same-session follow-up.<br/>
        # Disabled by default (`0s`).
        gracePeriod: "0s"
        # -- Interval at which the queue polls backend pod metrics for capacity.
        pollInterval: "100ms"
    gatewayAPI:
      # -- Enable Gateway API related features.
      enabled: false
      # -- Enable Gateway API Inference Extension features.<br/>
      # Requires `gatewayAPI.enabled` to be true.
      inferenceExtension: false
    # -- The router will drain all in-flight requests before forcefully closing connections.
    terminationGracePeriodSeconds: 330
    # -- Drain timeout for kthena-router graceful shutdown.
    # -- This should be less than terminationGracePeriodSeconds.
    drainTimeout: 5m

global:
  # -- Certificate Management Mode.<br/>
  #  Three mutually exclusive options for managing TLS certificates:<br/>
  #  - `auto`: Webhook servers generate self-signed certificates automatically.<br/>
  #  - `cert-manager`: Use cert-manager to generate and manage certificates (requires cert-manager installation).<br/>
  #  - `manual`: Provide your own certificates via caBundle.
  certManagementMode: auto
  webhook:
    # -- CA bundle for webhook server certificates (base64-encoded).<br/>
    # This is ONLY required when `certManagementMode` is set to "manual".<br/>
    # You can generate it with: `cat /path/to/your/ca.crt | base64 | tr -d '\n'`<br/>
    caBundle: ""
